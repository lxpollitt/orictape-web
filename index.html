<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orictape</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>ORICTAPE</h1>
        <input type="file" id="file-input" accept=".wav,.tap" multiple hidden />
        <label for="file-input" id="file-label">Load files…</label>
        <button id="merge-btn" hidden>Merge programs…</button>
        <button id="build-tap" hidden>Build TAP…</button>
        <p id="status">Load a WAV file to begin.</p>
      </header>
      <nav id="prog-tabs"></nav>
      <main id="panels">
        <div id="waveform-panel">
          <div id="waveform-header">
            <span id="waveform-title">Waveform</span>
            <div id="waveform-zoom">
              <span id="zoom-label">Zoom:</span>
              <span id="zoom-level">100%</span>
              <button class="zoom-btn" id="zoom-in"    title="Zoom in">+</button>
              <button class="zoom-btn" id="zoom-reset" title="Reset zoom">↺</button>
              <button class="zoom-btn" id="zoom-out"   title="Zoom out">−</button>
            </div>
            <label id="normalise-label">
              <input type="checkbox" id="normalise-toggle">
              Normalise
            </label>
          </div>
          <canvas id="waveform-canvas"></canvas>
        </div>
        <div id="hex-panel" tabindex="0">
          <div id="hex-view"></div>
        </div>
        <div id="basic-panel">
          <div id="basic-header">
            <span id="basic-type"></span>
            <label id="fix-label" hidden>
              <input type="checkbox" id="fix-toggle">
              Fix pointers &amp; terminators
            </label>
            <label id="wrap-label" hidden>
              <input type="checkbox" id="wrap-toggle" checked>
              Wrap
            </label>
          </div>
          <div id="search-bar" hidden>
            <input id="search-input" type="text" placeholder="Search…" autocomplete="off" spellcheck="false" />
            <span id="search-count"></span>
            <button class="search-btn" id="search-prev" title="Previous match (Shift+Enter)">↑</button>
            <button class="search-btn" id="search-next" title="Next match (Enter)">↓</button>
            <button class="search-btn" id="search-close" title="Close (Escape)">×</button>
          </div>
          <div id="basic-view" tabindex="0"></div>
        </div>
      </main>
    <footer id="statusbar"></footer>
    </div>
    <div id="tap-modal" class="tap-modal-overlay" hidden>
      <div class="tap-modal-box">
        <div class="tap-modal-body">
          <div class="tap-col tap-col-avail">
            <div class="tap-col-header">Available</div>
            <div class="tap-col-scroll" id="tap-avail"></div>
          </div>
          <div class="tap-col tap-col-queue">
            <div class="tap-col-header">Save order</div>
            <div class="tap-col-scroll" id="tap-queue"></div>
          </div>
          <div class="tap-col tap-col-auto">
            <div class="tap-col-header">Auto-run</div>
            <div class="tap-col-scroll" id="tap-auto"></div>
          </div>
        </div>
        <div class="tap-modal-footer">
          <label id="tap-meta-label">
            <input type="checkbox" id="tap-meta-toggle" checked>
            Include ORICTAPE metadata
          </label>
          <button id="tap-cancel">Cancel</button>
          <button id="tap-download" disabled>Download .tap</button>
        </div>
      </div>
    </div>
    <div id="merge-modal" class="tap-modal-overlay" hidden>
      <div class="tap-modal-box merge-modal-box">
        <div class="tap-modal-body merge-modal-body">
          <p class="merge-modal-hint">Select two programs to merge:</p>
          <div id="merge-picker"></div>
        </div>
        <div class="tap-modal-footer">
          <button id="merge-cancel">Cancel</button>
          <button id="merge-ok" disabled>Merge</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
