<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orictape</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>ORICTAPE</h1>
        <input type="file" id="file-input" accept=".wav" />
        <p id="status">Load a WAV file to begin.</p>
      </header>
      <nav id="prog-tabs"></nav>
      <main id="panels">
        <div id="waveform-panel">
          <canvas id="waveform-canvas"></canvas>
        </div>
        <div id="hex-panel">
          <div id="hex-view"></div>
        </div>
        <div id="basic-panel">
          <div id="basic-view"></div>
        </div>
      </main>
    <footer id="statusbar"></footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
